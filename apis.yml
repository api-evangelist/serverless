- type: Features
  data:
  - name: Function-as-a-Service Runtimes
    description: Serverless platforms execute short-lived, stateless functions in managed runtimes that automatically scale from zero to many instances based on incoming requests or events.
  - name: Event-Driven Invocation
    description: Functions are triggered by HTTP requests, queue messages, object storage events, scheduled cron jobs, database changes, and pub/sub topics without dedicated listeners.
  - name: Edge Function Distribution
    description: Edge runtimes like Cloudflare Workers, Vercel Edge Functions, and Fastly Compute@Edge execute code in points of presence physically close to end users, reducing latency.
  - name: Cold Start and Snapshot Optimization
    description: Platforms reduce cold start latency through V8 isolates, Firecracker microVMs, AWS Lambda SnapStart, and WebAssembly-based instant startup runtimes.
  - name: Durable Workflows and Orchestration
    description: Services like AWS Step Functions, Inngest, and Trigger.dev provide durable execution, retries, sleeps, and long-running workflows on top of serverless functions.
  - name: Pay-per-Invocation Billing
    description: Costs scale linearly with usage, billed per invocation and gigabyte-second of compute time, with generous free tiers that absorb most low-traffic workloads.
  - name: WebAssembly Serverless
    description: Platforms like Fermyon Spin, wasmCloud, and Fastly Compute@Edge run WebAssembly modules with sub-millisecond startup, strong sandboxing, and polyglot language support.
  - name: Function URLs and HTTP Endpoints
    description: Direct HTTPS endpoints for functions (Lambda Function URLs, Cloud Run, Workers routes) eliminate the need for a separate API gateway for simple HTTP services.
- type: UseCases
  data:
  - name: API Backends and Microservices
    description: Serverless functions back HTTP APIs and microservices, scaling to zero during idle periods and absorbing traffic spikes without capacity planning.
  - name: Webhook Receivers and Integrations
    description: Functions process incoming webhooks from SaaS platforms (Stripe, GitHub, Slack), validate signatures, transform payloads, and fan out to downstream systems.
  - name: Scheduled and Cron Jobs
    description: Platforms like Vercel Cron, Cloudflare Cron Triggers, and EventBridge schedule functions to run on a cadence for batch jobs, cleanups, and periodic syncs.
  - name: Image and Media Processing
    description: Functions resize, transcode, or watermark uploaded media in response to object storage events, often paired with edge caching for delivery.
  - name: Real-Time Edge Personalization
    description: Edge functions rewrite responses, inject A/B test variants, geolocate visitors, and personalize HTML at the CDN edge with single-digit-millisecond overhead.
  - name: AI Inference and Agent Tools
    description: Serverless GPU platforms like Modal and Cloud Run run AI model inference on demand; functions also serve as tool endpoints for LLM agents.
  - name: Durable Long-Running Workflows
    description: Step Functions, Inngest, and Trigger.dev orchestrate multi-step business processes with retries, human-in-the-loop steps, and durable timers across hours or days.
- type: Integrations
  data:
  - name: AWS Lambda
    description: The original FaaS platform with first-class integrations into 200+ AWS services, Function URLs, SnapStart, and container image support.
  - name: Cloudflare Workers
    description: V8-isolate edge runtime executing JavaScript and WebAssembly in 300+ points of presence with sub-millisecond cold starts.
  - name: Google Cloud Run
    description: Container-based serverless platform that scales any HTTP container from zero, with both fully managed and Kubernetes-backed deployment modes.
  - name: Vercel Functions
    description: Edge and Node.js serverless functions tightly integrated with the Vercel frontend platform, Next.js, and ISR.
  - name: Modal
    description: Python-first serverless platform for AI inference, batch jobs, and long-running GPU workloads with code-defined infrastructure.
  - name: Inngest
    description: Durable execution and event-driven workflow platform built on top of serverless functions across cloud providers.
  - name: Fermyon Spin
    description: WebAssembly-native serverless runtime supporting polyglot Spin apps deployed to Fermyon Cloud or self-hosted clusters.
  - name: Supabase Functions
    description: Deno-based edge functions colocated with Supabase Postgres, Auth, and Storage for backend-as-a-service workloads.
